<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Game</title>
		<!-- <link href="/style.css" rel="stylesheet" type="text/css" media="all"> -->
		<style>
			html, body {
				width: 100vw;
				height: 100vh;
				margin: 0;
				background: #000;
			}
			canvas {
				position: fixed;
				width: 100%;
				height: 100%;
				image-rendering: pixelated;
			}
			pre {
				position: fixed;
				background-color: #0000007f;
				backdrop-filter: blur(4px);
				margin: 0;
				padding: 4px;
				color: white;
			}
		</style>

		<script type="x-shader/x-fragment" id="FRAG_SHADER"># version 300 es
precision highp float;

uniform lowp vec2 u_resolution;
uniform highp float u_time;
uniform mediump float u_deltaTime;

uniform sampler2D u_image;
uniform sampler2D u_bayer;

out vec4 fragColor;

void rotate(inout vec2 p, float a) {
	p = cos(a)*p + sin(a)*vec2(p.y, -p.x);
}

// sdf from https://www.shadertoy.com/view/wtVyWK

float scene(vec3 p) {
	p = fract(p + 0.5);
	return -length(p - vec3(0.5)) + 0.7;
}

vec3 norm(vec3 p) {
	mat3 k = mat3(p,p,p)-mat3(0.001);
	vec3 n = normalize(scene(p) - vec3(scene(k[0]),scene(k[1]),scene(k[2])));
	return scene(p) > 0.001 ? vec3(-1) : n;
}

void main() {
	vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy ) / u_resolution.y;

	vec3 origin = vec3(0,0,-2.0);
	rotate(origin.xz, -u_time);
	vec3 dir = normalize(vec3(uv,1));
	rotate(dir.xz, -u_time);

	float rayLength = 0.0;
	int STEPS = 0;
	float dist = 0.0;

	for (int steps = 0; steps < 80; steps++) {
		dist = scene(origin + dir * rayLength);

		if (dist < 0.001) break;
		if (rayLength > 10.0) break;

		rayLength += dist;
		STEPS = steps;
	}

	vec3 n = norm(origin + dir * rayLength);
	rotate(n.xz, u_time);
	
	// color
	vec3 col = n * 0.5 + 0.5;

	// ao
	col *= 1.0 - vec3(STEPS) / 80.0;

	// fog
	col = mix(col, vec3(1), rayLength / 10.0);

	// dither pass
	float bayer = texture(u_bayer, gl_FragCoord.xy / 16.0).x;
	col = vec3(col.r > bayer, col.g > bayer, col.b > bayer);

	fragColor = vec4(col, 1.0);
}
		</script>

	</head>
	<body>
		<canvas id="glCanvas"></canvas>
		<pre></pre>

		<script type="e">
const [realLog, realWarn, realError] = [console.log, console.warn, console.error];
console.log = (e)=>{document.querySelector("pre").innerHTML += "<span>" + e + "</span>\n"; realLog(e)};
console.warn = (e)=>{document.querySelector("pre").innerHTML += "<span style='color:yellow'>" + e + "</span>\n"; realWarn(e)};
console.error = (e)=>{document.querySelector("pre").innerHTML += "<span style='color:red'>" + e + "</span>\n"; realError(e)};
		</script>
		<script src="shader.js"></script>
		<script src="main.js"></script>
		<script src="game.js"></script>
	</body>
</html>
