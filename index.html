<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>test</title>
		<!-- <link href="/style.css" rel="stylesheet" type="text/css" media="all"> -->
		<style>
			html, body {
				width: 100%;
				height: 100%;
				margin: 0;
			}
			canvas {
				position: fixed;
				width: 100%;
				height: 100%;
				image-rendering: pixelated;
			}
		</style>



		<script type="x-shader/x-vertex" id="VERT_SHADER">
precision highp float;
attribute vec2 a_position;

void main() {
	gl_Position = vec4(a_position, 0, 1);
}
		</script>





		<script type="x-shader/x-fragment" id="FRAG_SHADER">
precision highp float;

uniform lowp vec2 u_resolution;
uniform highp float u_time;
uniform mediump float u_deltaTime;

uniform sampler2D u_bayer;
uniform sampler2D u_image;


void main() {
	vec2 uv = gl_FragCoord.xy / u_resolution;

	float bayer = texture2D(u_bayer, mod(gl_FragCoord.xy / 8.0, vec2(1))).r;
	
	vec3 col = texture2D(u_image, mod(gl_FragCoord.xy / vec2(800, -1192), vec2(1))).rgb;

	col = vec3(col.r > bayer, col.g > bayer, col.b > bayer);

	gl_FragColor = vec4(col, 1.0);
}
		</script>

	</head>
	<body>
		<canvas id="glCanvas"></canvas>
		<script src="shader.js"></script>
		<script src="main.js"></script>
	</body>
</html>
